name: mobile_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
    
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # HTTP & API
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # Auth
  local_auth: ^2.1.8          # Face ID / Biometrics
  
  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  pretty_qr_code: ^3.6.0
  # mobile_scanner: ^5.0.0      # QR scanner - TODO: Fix CocoaPods conflict
  
  # Utils
  intl: ^0.19.0
  clipboard: ^0.1.3
  share_plus: ^10.0.0
  firebase_core: ^3.4.0
  firebase_messaging: ^15.0.0  # Push notifications
  
  # Stellar
  # Note: Use HTTP calls to your backend - no official Dart Stellar SDK needed
  
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.4

  flutter_launcher_icons: 
  pinput: ^5.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/svgs/
    - assets/animations/

fonts:
  - family: NeueMontreal
    fonts:
      - asset: assets/fonts/neuemontreal-regular.otf
      - asset: assets/fonts/neuemontreal-medium.otf
      - asset: assets/fonts/neuemontreal-bold.otf
      - asset: assets/fonts/neuemontreal-light.otf
      - asset: assets/fonts/neuemontreal-italic.otf
      - asset: assets/fonts/neuemontreal-mediumitalic.otf
      - asset: assets/fonts/neuemontreal-bolditalic.otf
      - asset: assets/fonts/neuemontreal-lightitalic.otf

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

  # Android adaptive icon (API 26+)
  adaptive_icon_background: "#FFFFFF"   
  adaptive_icon_foreground: "assets/images/logo.png"

  # Different icons per platform
  image_path_android: "assets/images/logo.png"
  image_path_ios: "assets/images/logo.png"

  # Remove alpha channel for iOS (recommended)
  remove_alpha_ios: true
